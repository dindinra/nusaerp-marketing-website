<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test CSS NusaERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Test CSS - copy dari style.css yang penting */
    :root {
      --primary: #6366f1;
      --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8fafc;
    }
    
    .hero {
      background: var(--gradient);
      color: white;
      padding: 100px 20px;
      text-align: center;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    
    .btn {
      padding: 14px 32px;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      margin: 10px;
    }
    
    .btn-primary {
      background: white;
      color: var(--primary);
    }
    
    .chat-widget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 99999;
    }
    
    .chat-toggle {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }
    
    .chat-window {
      position: absolute;
      bottom: 80px;
      right: 0;
      width: 350px;
      height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-window.active {
      display: flex;
    }
    
    .chat-header {
      background: var(--gradient);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Test NusaERP CSS</h1>
    <p>Jika ini tampil dengan gradient purple, berarti CSS jalan!</p>
    <a href="#" class="btn btn-primary">Test Button</a>
  </div>
  
  <p>Scroll down to see chat widget...</p>
  <div style="height: 1000px;"></div>
  
  <div class="chat-widget">
    <button class="chat-toggle" onclick="document.querySelector('.chat-window').classList.toggle('active')">
      <span>💬</span>
      <span>Chat CS</span>
    </button>
    
    <div class="chat-window">
      <div class="chat-header">
        <div>
          <h4>NusaERP CS</h4>
          <span>Online</span>
        </div>
        <button onclick="document.querySelector('.chat-window').classList.remove('active')">✕</button>
      </div>
      <div style="padding: 20px; flex: 1; background: #f8fafc;">
        <p style="background: white; padding: 12px 15px; border-radius: 15px; margin: 0;">Halo! Ada yang bisa dibantu?</p>
      </div>
      <div style="padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px;">
        <input type="text" placeholder="Ketik pesan..." style="flex: 1; padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 25px;">
        <button style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px;">Kirim</button>
      </div>
    </div>
  </div>
  
  <script>
    // Test: Jika chat toggle diklik, toggle class active
    document.querySelector('.chat-toggle').addEventListener('click', function() {
      document.querySelector('.chat-window').classList.toggle('active');
    });
  </script>
</body>
</html>
